set timeout=10
set default=0

insmod all_video
insmod gfxterm
set gfxmode=800x600x32,640x480x32,auto
set gfxpayload=text

insmod part_gpt
insmod part_msdos
insmod fat
insmod iso9660
insmod multiboot
insmod multiboot2

terminal_input console
terminal_output console

set color_normal=light-cyan/black
set color_highlight=black/light-green
set menu_color_normal=light-cyan/black
set menu_color_highlight=black/light-green

echo ""
