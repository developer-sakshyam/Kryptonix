menuentry "  >> Boot Kryptonix v0.1 <<" {
    insmod all_video
    set gfxpayload=text
    multiboot /boot/kernel.elf
    boot
}

menuentry "  >> Boot Kryptonix v0.1 (UEFI fallback) <<" {
    insmod all_video
    set gfxpayload=text
    insmod multiboot2
    multiboot2 /boot/kernel.elf
    boot
}

menuentry "  >> Reboot <<" {
    reboot
}

menuentry "  >> Shutdown <<" {
    halt
}
